name: Auto Create PR on Push

on:
  push:
    branches:
      - '**'          # trigger on any branch push
      - '!main'       # except main
      - '!master'     # except master

jobs:
  create-pull-request:
    name: Create Pull Request
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Ensure the auto-pr label exists (ignore error if it already does)
          gh label create auto-pr --color 0E8A16 --description "Auto-generated PR" 2>/dev/null || true

          # Skip if a PR from this branch into main is already open
          existing=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "An open PR for '$BRANCH' → main already exists. Nothing to do."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "PR: $BRANCH → main" \
            --label auto-pr \
            --body "$(cat <<EOF
          ## 🚀 Auto-generated Pull Request

          **Branch:** \`$BRANCH\`
          **Triggered by commit:** \`${{ github.sha }}\`
          **Author:** ${{ github.actor }}

          ---
          ### Commit Message
          $COMMIT_MSG

          ---
          > ⚠️ Please review the changes before merging.
          EOF
          )"
